<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leads MeLi</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: #2e2e3e;
      --border2: #3a3a4e;
      --text: #f0f0f5;
      --text2: #8888a0;
      --text3: #55556a;
      --accent: #ffb703;
      --green: #2ec486;
      --blue: #4a9eff;
      --amber: #ffb703;
      --red: #e63946;
      --radius: 10px;
      --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px; position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .logo-text { font-size: 15px; font-weight: 600; }
    .logo-sub { font-size: 12px; color: var(--text2); margin-left: 4px; font-weight: 300; }

    .stats-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
    .stat { background: var(--surface); padding: 14px 20px; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; }
    .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
    .stat-num.green { color: var(--green); }
    .stat-num.amber { color: var(--amber); }
    .stat-num.blue  { color: var(--blue); }
    .stat-num.red   { color: var(--red); }

    .tabs {
      display: flex; align-items: center; gap: 0;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .tab {
      padding: 12px 18px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      color: var(--text2); background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 7px;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-badge {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 10px; padding: 1px 7px; font-size: 11px;
      font-family: 'DM Mono', monospace; color: var(--text3);
    }
    .tab.active .tab-badge { background: #2a2000; border-color: #4a3500; color: var(--amber); }

    .toolbar {
      padding: 12px 24px; display: flex; gap: 10px; align-items: center;
      justify-content: flex-end; background: var(--bg); border-bottom: 1px solid var(--border); position: relative;
    }
    .toolbar-menu { position: relative; }
    .toolbar-panel {
      position: absolute; top: calc(100% + 10px); right: 0;
      width: min(420px, calc(100vw - 32px)); background: var(--surface);
      border: 1px solid var(--border2); border-radius: var(--radius);
      box-shadow: 0 18px 40px rgba(0,0,0,.35); padding: 14px; display: none; z-index: 120;
    }
    .toolbar-panel.open { display: grid; gap: 10px; }
    .toolbar-actions { display: flex; justify-content: flex-end; gap: 8px; }

    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: .4; }

    input[type=text], select, textarea {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); padding: 8px 12px;
      font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .15s;
    }
    .search-wrap input[type=text] { padding-left: 34px; }
    input[type=text]:focus, select:focus, textarea:focus { border-color: var(--border2); }
    input[type=text]::placeholder, textarea::placeholder { color: var(--text3); }

    .btn { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; transition: opacity .15s, transform .1s; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { opacity: .9; }
    .btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--text2); }
    .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface); color: var(--text2); font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: .5px; padding: 10px 16px; text-align: left;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:hover { background: var(--surface); }
    td { padding: 10px 16px; font-size: 13px; color: var(--text); vertical-align: middle; }

    .name { font-weight: 600; color: var(--text); }
    .phone-wrap { display: flex; align-items: center; gap: 6px; }
    .phone { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); }
    .wa-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; border-radius: 50%; background: #0d3320;
      border: 1px solid #1a5a38; color: #25d366; text-decoration: none;
      font-size: 13px; transition: all .15s; flex-shrink: 0;
    }
    .wa-btn:hover { background: #1a5a38; }
    .auto-cell { color: var(--text2); font-size: 12px; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .date-cell { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); white-space: nowrap; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px;
      border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap;
      cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: opacity .15s;
    }
    .badge:hover { opacity: .85; }
    .badge.sin         { background: #1e1e28; color: var(--text2); border: 1px solid var(--border2); }
    .badge.interesado  { background: #0e2e1e; color: var(--green); border: 1px solid #1a4a2e; }
    .badge.recontactar { background: #2e2000; color: var(--amber); border: 1px solid #4a3500; }
    .badge.nocontesta  { background: #2e0e0e; color: var(--red);   border: 1px solid #4a1a1a; }
    .badge.noint       { background: #1a1a22; color: var(--text3); border: 1px solid var(--border); }
    .badge.cerrado     { background: #0e1e2e; color: var(--blue);  border: 1px solid #1a3a50; }

    .days-badge {
      font-size: 11px; font-family: 'DM Mono', monospace; padding: 2px 6px;
      border-radius: 4px; white-space: nowrap;
    }
    .days-badge.hot  { background: #2e0e0e; color: var(--red);   border: 1px solid #4a1a1a; }
    .days-badge.warm { background: #2e2000; color: var(--amber); border: 1px solid #4a3500; }
    .days-badge.ok   { background: #0e2e1e; color: var(--green); border: 1px solid #1a4a2e; }
    .days-badge.none { color: var(--text3); }

    .prio { font-size: 12px; }
    .action-btn {
      background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text2); padding: 4px 10px; font-size: 12px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all .15s;
    }
    .action-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); width: 100%; max-width: 480px; animation: slideUp .2s ease; }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 4px; }
    .modal-close:hover { background: var(--surface2); color: var(--text); }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
    .field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
    .field input, .field select, .field textarea { background: var(--surface2); border: 1px solid var(--border); padding: 9px 12px; }
    .field textarea { resize: vertical; min-height: 70px; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .loading, .empty { text-align: center; padding: 60px; color: var(--text2); }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 500; z-index: 300; opacity: 0; transition: opacity .2s; white-space: nowrap; max-width: calc(100vw - 32px); overflow: hidden; text-overflow: ellipsis; }
    .toast.show { opacity: 1; }

    .inline-select, .inline-input, .inline-textarea {
      width: 100%; min-width: 0; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 12px; font-family: 'DM Sans', sans-serif;
      transition: border-color .15s, opacity .15s;
    }
    .inline-select, .inline-input { padding: 6px 8px; }
    .inline-input { font-family: 'DM Mono', monospace; }
    .inline-textarea { padding: 7px 8px; min-height: 34px; resize: vertical; white-space: pre-wrap; }
    .inline-select:focus, .inline-input:focus, .inline-textarea:focus { border-color: var(--accent); outline: none; }
    .inline-select.saving, .inline-input.saving, .inline-textarea.saving { opacity: .5; pointer-events: none; }
    .inline-cell { min-width: 150px; }
    .inline-cell.notes-inline { min-width: 200px; }

    @media (max-width: 640px) {
      .stats-bar { grid-template-columns: repeat(3, 1fr); }
      .stat:nth-child(4), .stat:nth-child(5) { display: none; }
      .hide-mobile { display: none; }
      td, th { padding: 10px 10px; }
      .toolbar { padding: 10px 12px; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return esc(s).replace(/'/g,'&#39;');}

function normalizeLead(row) {
  const x = (row.raw_json && typeof row.raw_json === 'object') ? row.raw_json : {};
  return {
    _id: row.lead_key,
    _raw: row.raw_json || {},
    Nombre: row.buyer_name || '',
    Auto: row.item_title || '',
    Telefono: row.phone || '',
    Estado: row.status || '⏳ Sin contactar',

    FechaLead: row.date_created || '',
    FechaContacto: x.fecha_contacto || '',
  };
}

function displayDate(v) {
  if (!v) return '';
  try {
    const d = new Date(v);
    if (isNaN(d.getTime())) return String(v);
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  } catch(_) { return String(v); }
}

function toInputDate(v) {
  if (!v) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(String(v))) return v;
  try {
    const d = new Date(v);
    if (isNaN(d.getTime())) return '';
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  } catch(_){ return ''; }
}

function daysSince(v) {
  if (!v) return null;
  const d = new Date(v);
  if (isNaN(d.getTime())) return null;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

function daysBadge(v) {
  const n = daysSince(v);
  if (n === null) return '<span class="days-badge none">—</span>';
  if (n === 0) return `<span class="days-badge ok">hoy</span>`;
  if (n <= 3) return `<span class="days-badge warm">${n}d</span>`;
  return `<span class="days-badge hot">${n}d</span>`;
}

function waLink(tel) {
  if (!tel) return '';
  const num = tel.replace(/\D/g, '');
  return `<a class="wa-btn" href="https://wa.me/${num}" target="_blank" title="WhatsApp">💬</a>`;
}

  const tb = document.getElementById('tableBody');
  tb.innerHTML = `<tr><td colspan="10"><div class="loading"><div class="spinner"></div>Cargando leads...</div></td></tr>`;
  try {
    const { data, error } = await db.from('meli_leads').select('*').order('date_created', { ascending: false });
    if (error) throw error;
    allLeads = (data || []).map(normalizeLead);
    updateStats();
    renderTable();
  } catch(e) {
    tb.innerHTML = `<tr><td colspan="10"><div class="empty">Error al cargar: ${esc(e.message)}</div></td></tr>`;
  }
}

function updateStats() {
  const activos = allLeads.filter(l => !ARCHIVED.includes(l.Estado));
  const count = (st) => activos.filter(l => l.Estado === st).length;
  document.getElementById('s-total').textContent = activos.length;
  document.getElementById('s-sin').textContent = count('⏳ Sin contactar');
  document.getElementById('s-int').textContent = count('✅ Interesado');
  document.getElementById('s-rec').textContent = count('📞 Recontactar');
  document.getElementById('s-cer').textContent = allLeads.filter(l => l.Estado === '🤝 Cerrado').length;
  document.getElementById('cnt-activos').textContent = activos.length;
  document.getElementById('cnt-archivados').textContent = allLeads.filter(l => ARCHIVED.includes(l.Estado)).length;
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-activos').classList.toggle('active', tab === 'activos');
  document.getElementById('tab-archivados').classList.toggle('active', tab === 'archivados');
  renderTable();
}

function renderTable() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const est = document.getElementById('filterEstado').value;
  const prio = document.getElementById('filterPrio').value;
  const orden = document.getElementById('filterFechaOrden').value || 'desc';

  const leads = allLeads.filter(l => {
    const isArchived = ARCHIVED.includes(l.Estado);
    if (activeTab === 'activos' && isArchived) return false;
    if (activeTab === 'archivados' && !isArchived) return false;
    const matchQ = !q || [l.Nombre, l.Auto, l.Telefono, l.Notas].some(v => String(v||'').toLowerCase().includes(q));
    const matchE = !est || l.Estado === est;
    const matchP = !prio || l.Prioridad === prio;
    return matchQ && matchE && matchP;
  }).sort((a, b) => {
    const da = a.FechaLead ? new Date(a.FechaLead) : null;
    const db2 = b.FechaLead ? new Date(b.FechaLead) : null;
    if (da && db2) return orden === 'asc' ? da - db2 : db2 - da;
    if (db2) return orden === 'asc' ? -1 : 1;
    if (da)  return orden === 'asc' ? 1 : -1;
    return 0;
  });

  const tb = document.getElementById('tableBody');
  if (!leads.length) { tb.innerHTML = `<tr><td colspan="10"><div class="empty">Sin resultados</div></td></tr>`; return; }

  tb.innerHTML = leads.map((l, i) => {
    const st = l.Estado || '⏳ Sin contactar';
    const pr = l.Prioridad || '🟡 Media';
    const sc = STATUS_CLASS[st] || 'sin';
    const id = escAttr(l._id);
    const statusOpts = STATUS_OPTIONS.map(s => `<option value="${escAttr(s)}"${st===s?' selected':''}>${esc(s)}</option>`).join('');
    const prioOpts   = PRIORITY_OPTIONS.map(p => `<option value="${escAttr(p)}"${pr===p?' selected':''}>${esc(p)}</option>`).join('');
    return `<tr>
      <td style="color:var(--text3);font-size:12px;font-family:'DM Mono',monospace">${i+1}</td>
      <td><div class="name">${esc(l.Nombre)}</div></td>
      <td class="auto-cell hide-mobile" title="${escAttr(l.Auto)}">${esc(l.Auto)}</td>
      <td><div class="phone-wrap">${waLink(l.Telefono)}<span class="phone">${esc(l.Telefono)}</span></div></td>
      <td class="inline-cell">
        <select class="inline-select badge ${sc}" data-prev="${escAttr(st)}" onchange="inlineUpdate('${id}',this,'estado')">${statusOpts}</select>
      </td>
      <td class="hide-mobile">${daysBadge(l.FechaLead)}</td>
      <td class="hide-mobile inline-cell">
        <input class="inline-input date-cell" type="date" value="${escAttr(toInputDate(l.FechaContacto))}" data-prev="${escAttr(toInputDate(l.FechaContacto))}" onchange="inlineUpdate('${id}',this,'fecha')">
      </td>
      <td class="hide-mobile inline-cell notes-inline">
        <textarea class="inline-textarea" placeholder="Nota..." data-prev="${escAttr(l.Notas)}" title="${escAttr(l.Notas)}" onblur="inlineUpdate('${id}',this,'notas')" onkeydown="handleTextareaKey(event,'${id}',this,'notas')">${esc(l.Notas)}</textarea>
      </td>
      <td class="inline-cell">
        <select class="inline-select prio" data-prev="${escAttr(pr)}" onchange="inlineUpdate('${id}',this,'prioridad')">${prioOpts}</select>
      </td>
      <td><button class="action-btn" onclick="openEdit('${id}')">Editar</button></td>
    </tr>`;
  }).join('');
}

function handleTextareaKey(e, id, el, kind) {
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); el.blur(); }
  if (e.key==='Escape') { el.value = el.dataset.prev||''; el.blur(); }
}

async function inlineUpdate(id, el, kind) {
  if (!el) return;
  const value = String('value' in el ? el.value : el.textContent).trim();
  const prev = el.dataset.prev || '';
  if (value === prev) return;

  const idx = allLeads.findIndex(l => l._id === id);
  if (idx === -1) return;
  const lead = allLeads[idx];

  // Build Supabase update payload
  const extra = { ...lead._raw };
  let payload = {};

  if (kind === 'estado') {
    payload.status = value;
    if (!lead.FechaContacto) {
      extra.fecha_contacto = new Date().toISOString().split('T')[0];
      payload.raw_json = extra;
    }
  } else if (kind === 'fecha') {
    extra.fecha_contacto = value;
    payload.raw_json = extra;
  } else if (kind === 'notas') {
    extra.notas = value;
    payload.raw_json = extra;
  } else if (kind === 'prioridad') {
    extra.prioridad = value;
    payload.raw_json = extra;
  }

  // Optimistic local update — no reload
  el.dataset.prev = value;
  if (kind === 'estado') allLeads[idx].Estado = value;
  else if (kind === 'fecha') { allLeads[idx].FechaContacto = value; allLeads[idx]._raw = extra; }
  else if (kind === 'notas') { allLeads[idx].Notas = value; allLeads[idx]._raw = extra; }
  else if (kind === 'prioridad') { allLeads[idx].Prioridad = value; allLeads[idx]._raw = extra; }

  // If status moved to archived tab, re-render to remove row from activos
  if (kind === 'estado') { updateStats(); renderTable(); }

  el.classList.add('saving');
  try {
    const { error } = await db.from('meli_leads').update(payload).eq('lead_key', id);
    if (error) throw error;
    toast('Guardado ✓');
  } catch(e) {
    // Revert on error
    el.value = prev; el.dataset.prev = prev;
    if (kind === 'estado') { allLeads[idx].Estado = prev; updateStats(); renderTable(); }
    toast('Error al guardar');
    console.error(e);
  } finally {
    el.classList.remove('saving');
  }
}

function toggleFiltersMenu(){document.getElementById('filtersPanel').classList.toggle('open');}
function closeFiltersMenu(){document.getElementById('filtersPanel').classList.remove('open');}
function clearFilters(){document.getElementById('searchInput').value='';document.getElementById('filterEstado').value='';document.getElementById('filterPrio').value='';document.getElementById('filterFechaOrden').value='desc';renderTable();}

function openAddModal() {
  ['f-nombre','f-tel','f-auto','f-notas'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-estado').value = '⏳ Sin contactar';
  document.getElementById('f-prio').value = '🟡 Media';
  document.getElementById('f-fechalead').value = new Date().toISOString().split('T')[0];
  document.getElementById('addModal').classList.add('open');
}

async function addLead() {
  const nombre = document.getElementById('f-nombre').value.trim();
  const auto   = document.getElementById('f-auto').value.trim();
  if (!nombre) { toast('Falta el nombre'); document.getElementById('f-nombre').focus(); return; }
  if (!auto)   { toast('Falta el auto/publicación'); document.getElementById('f-auto').focus(); return; }

  const fechaInput = document.getElementById('f-fechalead').value;
  const row = {
    lead_key: `manual_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
    source: 'manual',
    buyer_name: nombre,
    item_title: auto,
    phone: document.getElementById('f-tel').value.trim(),
    status: document.getElementById('f-estado').value,
    date_created: fechaInput ? new Date(fechaInput).toISOString() : new Date().toISOString(),
    raw_json: {
      prioridad: document.getElementById('f-prio').value,
      notas: document.getElementById('f-notas').value.trim(),
      fecha_contacto: '',
    },
  };
  try {
    closeModal('addModal');
    toast('Guardando...');
    const { error } = await db.from('meli_leads').insert(row);
    if (error) throw error;
    await loadData();
    toast('Lead agregado ✓');
  } catch(e) { toast('Error al guardar'); console.error(e); }
}

function openEdit(id) {
  const lead = allLeads.find(l => l._id === id);
  if (!lead) return;
  editingLead = lead;
  document.getElementById('editModalTitle').textContent = lead.Nombre || 'Editar lead';
  document.getElementById('e-nombre').value = lead.Nombre;
  document.getElementById('e-tel').value = lead.Telefono;
  document.getElementById('e-auto').value = lead.Auto;
  document.getElementById('e-estado').value = lead.Estado || '⏳ Sin contactar';
  document.getElementById('e-prio').value = lead.Prioridad || '🟡 Media';
  document.getElementById('e-fechacontacto').value = toInputDate(lead.FechaContacto);
  document.getElementById('e-fechalead').value = toInputDate(lead.FechaLead);
  document.getElementById('e-notas').value = lead.Notas;
  document.getElementById('editModal').classList.add('open');
}

async function saveEdit() {
  if (!editingLead) return;
  const nombre = document.getElementById('e-nombre').value.trim();
  const auto   = document.getElementById('e-auto').value.trim();
  if (!nombre) { toast('Falta el nombre'); document.getElementById('e-nombre').focus(); return; }
  if (!auto)   { toast('Falta el auto'); document.getElementById('e-auto').focus(); return; }

  const fechaLead = document.getElementById('e-fechalead').value;
  const extra = {
    ...editingLead._raw,
    prioridad: document.getElementById('e-prio').value,
    notas: document.getElementById('e-notas').value.trim(),
    fecha_contacto: document.getElementById('e-fechacontacto').value || '',
  };
  const payload = {
    buyer_name: nombre, item_title: auto,
    phone: document.getElementById('e-tel').value.trim(),
    status: document.getElementById('e-estado').value,
    date_created: fechaLead ? new Date(fechaLead).toISOString() : editingLead.FechaLead,
    raw_json: extra,
  };
  try {
    closeModal('editModal');
    toast('Guardando...');
    const { error } = await db.from('meli_leads').update(payload).eq('lead_key', editingLead._id);
    if (error) throw error;
    await loadData();
    toast('Cambios guardados ✓');
  } catch(e) { toast('Error al guardar cambios'); console.error(e); }
}

function closeModal(id){document.getElementById(id)?.classList.remove('open');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
document.addEventListener('click', e => {
  if (e.target.classList?.contains('modal-overlay')) e.target.classList.remove('open');
  const menu = document.querySelector('.toolbar-menu');
  if (menu && !menu.contains(e.target)) closeFiltersMenu();
});
loadData();
  </script>
</body>
</html>
